name: Abc Provision, storage cluster Downgrade/Upgrade workflow

on:
  workflow_dispatch:
    inputs:
      ai400x_123_124:
        type: boolean
        description: "Run on ai400x-123-124"
        default: true

      ai400x_125_126:
        type: boolean
        description: "Run on ai400x-125-126"
        default: false

      ref:
        type: string
        description: "The whamcloud/cluster-provisioning ref to build"
        default: "main"

defaults:
  run:
    shell: bash -eux {0}

jobs:
  parse_environments:
    runs-on: ubuntu-latest
    outputs:
      environments_json: ${{ steps.parse.outputs.environments_json }}

    steps:
      - name: Parse selected environments
        id: parse
        run: |
          ENVS=()

          if [[ "${{ inputs.ai400x_123_124 }}" == "true" ]]; then
            ENVS+=("ai400x-123-124")
          fi

          if [[ "${{ inputs.ai400x_125_126 }}" == "true" ]]; then
            ENVS+=("ai400x-125-126")
          fi

          JSON_ARRAY=$(printf '%s\n' "${ENVS[@]}" | jq -R . | jq -s -c .)
          echo "environments_json=$JSON_ARRAY" >> "$GITHUB_OUTPUT"

          echo "Selected environments: ${ENVS[*]}"
          echo "JSON: $JSON_ARRAY"

  abc_provision:
    needs: parse_environments
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.parse_environments.outputs.environments_json) }}
      fail-fast: false
    runs-on: [self-hosted, "${{ matrix.environment }}"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Display provision info
        run: |
          echo "========================================="
          echo "ABC Provision on: ${{ matrix.environment }}"

  setup_abc:
    needs: parse_environments
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.parse_environments.outputs.environments_json) }}
      fail-fast: false
    runs-on: [self-hosted, "${{ matrix.environment }}"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Display ABC action info
        run: |
          echo "========================================="
          echo "ABC ${{ inputs.abc_action }} on: ${{ matrix.environment }}"