name: Dispatch workflow

on:
  workflow_dispatch:
    inputs:
      ai400x2_133_134:
        type: boolean
        description: "ai400x2-133-134"
        default: false

      ai400x_123_124:
        type: boolean
        description: "ai400x-123-124"
        default: false

      ai400x_125_126:
        type: boolean
        description: "ai400x-125-126"
        default: false

      ai400x3_206_207:
        type: boolean
        description: "ai400x3-206-207"
        default: false

      ai400x2_multi_sfa_97_100:
        type: boolean
        description: "ai400x2-multi-sfa-97-100"
        default: false

      ai400x2_multi_sfa_123_126:
        type: boolean
        description: "ai400x2-multi-sfa-123-126"
        default: false

      sfa_version:
        type: boolean
        description: "SFA Version"
        default: false

jobs:
  parse_inputs:
    runs-on: ubuntu-latest

    outputs:
      selected_environments: ${{ steps.parse.outputs.environments }}

    steps:
      - name: Parse checkboxes and build environment list
        id: parse
        run: |
          ENVS=()

          if [[ "${{ inputs.ai400x2_133_134 }}" == "true" ]]; then
            ENVS+=("ai400x2-133-134")
          fi

          if [[ "${{ inputs.ai400x_123_124 }}" == "true" ]]; then
            ENVS+=("ai400x-123-124")
          fi

          if [[ "${{ inputs.ai400x_125_126 }}" == "true" ]]; then
            ENVS+=("ai400x-125-126")
          fi

          if [[ "${{ inputs.ai400x3_206_207 }}" == "true" ]]; then
            ENVS+=("ai400x3-206-207")
          fi

          if [[ "${{ inputs.ai400x2_multi_sfa_97_100 }}" == "true" ]]; then
            ENVS+=("ai400x2-multi-sfa-97-100")
          fi

          if [[ "${{ inputs.ai400x2_multi_sfa_123_126 }}" == "true" ]]; then
            ENVS+=("ai400x2-multi-sfa-123-126")
          fi

          if [[ "${{ inputs.sfa_version }}" == "true" ]]; then
            ENVS+=("SFA-Version")
          fi

          echo "environments=${ENVS[*]}" >> "$GITHUB_OUTPUT"

          echo "Selected environments:"
          printf '%s\n' "${ENVS[@]}"

  say_hello:
    runs-on: ubuntu-latest
    needs: parse_inputs

    steps:
      - name: Display selected environments
        run: |
          echo "Selected environments:"
          echo "${{ needs.parse_inputs.outputs.selected_environments }}"