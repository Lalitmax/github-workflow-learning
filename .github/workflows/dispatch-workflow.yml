name: Dispatch workflow

on:
  workflow_dispatch:
    inputs:
      env2:
      ai400x2_133_134:
        type: boolean
        description: "ai400x2-133-134"
        default: false

      ai400x_123_124:
        type: boolean
        description: "ai400x-123-124"
        default: false

      ai400x_125_126:
        type: boolean
        description: "ai400x-125-126"
        default: false

      ai400x3_206_207:
        type: boolean
        description: "ai400x3-206-207"
        default: false

      ai400x2_multi_sfa_97_100:
        type: boolean
        description: "ai400x2-multi-sfa-97-100"
        default: false

      ai400x2_multi_sfa_123_126:
        type: boolean
        description: "ai400x2-multi-sfa-123-126"
        default: false

      sfa_version:
        type: boolean
        description: "SFA Version"
        default: false

jobs:
  parse_inputs:
    runs-on: ubuntu-latest

    outputs:
      selected_environments: ${{ steps.parse.outputs.environments }}
      environments_json: ${{ steps.parse.outputs.environments_json }}

    steps:
      - name: Parse checkboxes and build environment list
        id: parse
        run: |
          ENVS=()

          if [[ "${{ inputs.ai400x2_133_134 }}" == "true" ]]; then
            ENVS+=("ai400x2-133-134")
          fi

          if [[ "${{ inputs.ai400x_123_124 }}" == "true" ]]; then
            ENVS+=("ai400x-123-124")
          fi

          if [[ "${{ inputs.ai400x_125_126 }}" == "true" ]]; then
            ENVS+=("ai400x-125-126")
          fi

          if [[ "${{ inputs.ai400x3_206_207 }}" == "true" ]]; then
            ENVS+=("ai400x3-206-207")
          fi

          if [[ "${{ inputs.ai400x2_multi_sfa_97_100 }}" == "true" ]]; then
            ENVS+=("ai400x2-multi-sfa-97-100")
          fi

          if [[ "${{ inputs.ai400x2_multi_sfa_123_126 }}" == "true" ]]; then
            ENVS+=("ai400x2-multi-sfa-123-126")
          fi

          if [[ "${{ inputs.sfa_version }}" == "true" ]]; then
            ENVS+=("SFA-Version")
          fi

          # Space-separated for display
          echo "environments=${ENVS[*]}" >> "$GITHUB_OUTPUT"

          # JSON array for matrix strategy
          JSON_ARRAY=$(printf '%s\n' "${ENVS[@]}" | jq -R . | jq -s -c .)
          echo "environments_json=$JSON_ARRAY" >> "$GITHUB_OUTPUT"

          echo "Selected environments:"
          printf '%s\n' "${ENVS[@]}"
          echo "JSON: $JSON_ARRAY"

  print_selected_environments:
    runs-on: ubuntu-latest
    needs: parse_inputs
    if: ${{ needs.parse_inputs.outputs.environments_json != '[]' }}
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.parse_inputs.outputs.environments_json) }}

    steps:
      - name: Display environment on dedicated machine
        run: |
          echo "Running on dedicated machine for: ${{ matrix.environment }}"
          echo "Environment: ${{ matrix.environment }}"